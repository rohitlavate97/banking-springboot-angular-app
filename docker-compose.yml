version: '3.9'

# =============================================================================
# Banking Platform - Docker Compose
# Run: docker compose up -d
# =============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - banking-network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-spring-defaults: &spring-defaults
  <<: *service-defaults
  environment:
    SPRING_PROFILES_ACTIVE: "docker"
    SPRING_CLOUD_CONFIG_URI: "http://config-server:8888"
    EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:eureka123@service-discovery:8761/eureka/"
    SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

services:

  # ============================================================
  # INFRASTRUCTURE: Databases
  # ============================================================

  postgres-auth:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD:-auth_secret_123}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD:-user_secret_123}
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_svc -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-account:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: postgres-account
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_svc
      POSTGRES_PASSWORD: ${POSTGRES_ACCOUNT_PASSWORD:-account_secret_123}
    volumes:
      - postgres-account-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_svc -d account_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-transaction:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: postgres-transaction
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: transaction_svc
      POSTGRES_PASSWORD: ${POSTGRES_TRANSACTION_PASSWORD:-txn_secret_123}
    volumes:
      - postgres-transaction-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_svc -d transaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-beneficiary:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: postgres-beneficiary
    environment:
      POSTGRES_DB: beneficiary_db
      POSTGRES_USER: beneficiary_svc
      POSTGRES_PASSWORD: ${POSTGRES_BENEFICIARY_PASSWORD:-ben_secret_123}
    volumes:
      - postgres-beneficiary-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beneficiary_svc -d beneficiary_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_svc
      POSTGRES_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD:-notif_secret_123}
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_svc -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-fraud:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: postgres-fraud
    environment:
      POSTGRES_DB: fraud_db
      POSTGRES_USER: fraud_svc
      POSTGRES_PASSWORD: ${POSTGRES_FRAUD_PASSWORD:-fraud_secret_123}
    volumes:
      - postgres-fraud-data:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_svc -d fraud_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-audit:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: postgres-audit
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_USER: audit_svc
      POSTGRES_PASSWORD: ${POSTGRES_AUDIT_PASSWORD:-audit_secret_123}
    volumes:
      - postgres-audit-data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_svc -d audit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE: Redis
  # ============================================================

  redis:
    <<: *service-defaults
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_123} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE: Kafka & Zookeeper
  # ============================================================

  zookeeper:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE: Spring Cloud
  # ============================================================

  config-server:
    <<: *service-defaults
    build:
      context: .
      dockerfile: backend/infrastructure/config-server/Dockerfile
    container_name: config-server
    environment:
      SPRING_PROFILES_ACTIVE: "docker,native"
      CONFIG_GIT_URI: "https://github.com/your-org/banking-config"
      CONFIG_SERVER_USERNAME: "config"
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-config_secret_123}
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  service-discovery:
    <<: *service-defaults
    build:
      context: .
      dockerfile: backend/infrastructure/service-discovery/Dockerfile
    container_name: service-discovery
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      <<: *spring-defaults
      EUREKA_USERNAME: eureka
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka123}
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  api-gateway:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/infrastructure/api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      service-discovery:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_123}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    ports:
      - "8080:8080"

  # ============================================================
  # BUSINESS SERVICES
  # ============================================================

  auth-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-auth:5432/auth_db"
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_AUTH_PASSWORD:-auth_secret_123}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    ports:
      - "8081:8081"

  user-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/user-service/Dockerfile
    container_name: user-service
    depends_on:
      postgres-user:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-user:5432/user_db"
      SPRING_DATASOURCE_USERNAME: user_svc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_USER_PASSWORD:-user_secret_123}
    ports:
      - "8082:8082"

  account-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/account-service/Dockerfile
    container_name: account-service
    depends_on:
      postgres-account:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-account:5432/account_db"
      SPRING_DATASOURCE_USERNAME: account_svc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_ACCOUNT_PASSWORD:-account_secret_123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_123}
    ports:
      - "8083:8083"

  transaction-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/transaction-service/Dockerfile
    container_name: transaction-service
    depends_on:
      postgres-transaction:
        condition: service_healthy
      kafka:
        condition: service_healthy
      account-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-transaction:5432/transaction_db"
      SPRING_DATASOURCE_USERNAME: transaction_svc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_TRANSACTION_PASSWORD:-txn_secret_123}
      SERVICES_ACCOUNT_SERVICE_URL: "http://account-service:8083"
    ports:
      - "8084:8084"

  beneficiary-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/beneficiary-service/Dockerfile
    container_name: beneficiary-service
    depends_on:
      postgres-beneficiary:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-beneficiary:5432/beneficiary_db"
      SPRING_DATASOURCE_USERNAME: beneficiary_svc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_BENEFICIARY_PASSWORD:-ben_secret_123}
    ports:
      - "8085:8085"

  notification-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-notification:5432/notification_db"
      SPRING_DATASOURCE_USERNAME: notification_svc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD:-notif_secret_123}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-noreply@banking.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8086:8086"

  fraud-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/fraud-service/Dockerfile
    container_name: fraud-service
    depends_on:
      postgres-fraud:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-fraud:5432/fraud_db"
      SPRING_DATASOURCE_USERNAME: fraud_svc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_FRAUD_PASSWORD:-fraud_secret_123}
    ports:
      - "8087:8087"

  audit-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/audit-service/Dockerfile
    container_name: audit-service
    depends_on:
      postgres-audit:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-audit:5432/audit_db"
      SPRING_DATASOURCE_USERNAME: audit_svc
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_AUDIT_PASSWORD:-audit_secret_123}
    ports:
      - "8088:8088"

  # ============================================================
  # MONITORING
  # ============================================================

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    <<: *service-defaults
    image: grafana/grafana:10.3.1
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"

# ============================================================
# NETWORKS
# ============================================================

networks:
  banking-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================
# VOLUMES
# ============================================================

volumes:
  postgres-auth-data:
  postgres-user-data:
  postgres-account-data:
  postgres-transaction-data:
  postgres-beneficiary-data:
  postgres-notification-data:
  postgres-fraud-data:
  postgres-audit-data:
  redis-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  prometheus-data:
  grafana-data:
