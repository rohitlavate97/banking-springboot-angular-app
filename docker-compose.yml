version: '3.9'

# =============================================================================
# Banking Platform - Docker Compose
# Run: docker compose up -d
# =============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - banking-network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-spring-defaults: &spring-defaults
  <<: *service-defaults
  environment:
    SPRING_PROFILES_ACTIVE: "docker"
    SPRING_CLOUD_CONFIG_URI: "http://config-server:8888"
    EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:eureka123@service-discovery:8761/eureka/"
    SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

services:

  # ============================================================
  # INFRASTRUCTURE: Databases
  # ============================================================

  mysql-auth:
    <<: *service-defaults
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_ROOT_PASSWORD: Admin@123
    volumes:
      - mysql-auth-data:/var/lib/mysql
    ports:
      - "3314:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-user:
    <<: *service-defaults
    image: mysql:8.0
    container_name: mysql-user
    environment:
      MYSQL_DATABASE: user_db
      MYSQL_ROOT_PASSWORD: Admin@123
    volumes:
      - mysql-user-data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-account:
    <<: *service-defaults
    image: mysql:8.0
    container_name: mysql-account
    environment:
      MYSQL_DATABASE: account_db
      MYSQL_ROOT_PASSWORD: Admin@123
    volumes:
      - mysql-account-data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-transaction:
    <<: *service-defaults
    image: mysql:8.0
    container_name: mysql-transaction
    environment:
      MYSQL_DATABASE: transaction_db
      MYSQL_ROOT_PASSWORD: Admin@123
    volumes:
      - mysql-transaction-data:/var/lib/mysql
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-beneficiary:
    <<: *service-defaults
    image: mysql:8.0
    container_name: mysql-beneficiary
    environment:
      MYSQL_DATABASE: beneficiary_db
      MYSQL_ROOT_PASSWORD: Admin@123
    volumes:
      - mysql-beneficiary-data:/var/lib/mysql
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-notification:
    <<: *service-defaults
    image: mysql:8.0
    container_name: mysql-notification
    environment:
      MYSQL_DATABASE: notification_db
      MYSQL_ROOT_PASSWORD: Admin@123
    volumes:
      - mysql-notification-data:/var/lib/mysql
    ports:
      - "3311:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-fraud:
    <<: *service-defaults
    image: mysql:8.0
    container_name: mysql-fraud
    environment:
      MYSQL_DATABASE: fraud_db
      MYSQL_ROOT_PASSWORD: Admin@123
    volumes:
      - mysql-fraud-data:/var/lib/mysql
    ports:
      - "3312:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-audit:
    <<: *service-defaults
    image: mysql:8.0
    container_name: mysql-audit
    environment:
      MYSQL_DATABASE: audit_db
      MYSQL_ROOT_PASSWORD: Admin@123
    volumes:
      - mysql-audit-data:/var/lib/mysql
    ports:
      - "3313:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE: Redis
  # ============================================================

  redis:
    <<: *service-defaults
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_123} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE: Kafka & Zookeeper
  # ============================================================

  zookeeper:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE: Spring Cloud
  # ============================================================

  config-server:
    <<: *service-defaults
    build:
      context: .
      dockerfile: backend/infrastructure/config-server/Dockerfile
    container_name: config-server
    environment:
      SPRING_PROFILES_ACTIVE: "docker,native"
      CONFIG_GIT_URI: "https://github.com/your-org/banking-config"
      CONFIG_SERVER_USERNAME: "config"
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-config_secret_123}
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  service-discovery:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/infrastructure/service-discovery/Dockerfile
    container_name: service-discovery
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      EUREKA_USERNAME: eureka
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka123}
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  api-gateway:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/infrastructure/api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      service-discovery:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_123}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    ports:
      - "8080:8080"

  # ============================================================
  # BUSINESS SERVICES
  # ============================================================

  auth-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      mysql-auth:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-auth:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Admin@123
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    ports:
      - "8081:8081"

  user-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/user-service/Dockerfile
    container_name: user-service
    depends_on:
      mysql-user:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-user:3306/user_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Admin@123
    ports:
      - "8082:8082"

  account-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/account-service/Dockerfile
    container_name: account-service
    depends_on:
      mysql-account:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-account:3306/account_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Admin@123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_123}
    ports:
      - "8083:8083"

  transaction-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/transaction-service/Dockerfile
    container_name: transaction-service
    depends_on:
      mysql-transaction:
        condition: service_healthy
      kafka:
        condition: service_healthy
      account-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-transaction:3306/transaction_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Admin@123
      SERVICES_ACCOUNT_SERVICE_URL: "http://account-service:8083"
    ports:
      - "8084:8084"

  beneficiary-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/beneficiary-service/Dockerfile
    container_name: beneficiary-service
    depends_on:
      mysql-beneficiary:
        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-beneficiary:3306/beneficiary_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Admin@123
    ports:
      - "8085:8085"

  notification-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      mysql-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-notification:3306/notification_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Admin@123
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-noreply@banking.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8086:8086"

  fraud-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/fraud-service/Dockerfile
    container_name: fraud-service
    depends_on:
      mysql-fraud:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-fraud:3306/fraud_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Admin@123
    ports:
      - "8087:8087"

  audit-service:
    <<: *spring-defaults
    build:
      context: .
      dockerfile: backend/services/audit-service/Dockerfile
    container_name: audit-service
    depends_on:
      mysql-audit:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-audit:3306/audit_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Admin@123
    ports:
      - "8088:8088"

  # ============================================================
  # MONITORING
  # ============================================================

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    <<: *service-defaults
    image: grafana/grafana:10.3.1
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"

# ============================================================
# NETWORKS
# ============================================================

networks:
  banking-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================
# VOLUMES
# ============================================================

volumes:
  mysql-auth-data:
  mysql-user-data:
  mysql-account-data:
  mysql-transaction-data:
  mysql-beneficiary-data:
  mysql-notification-data:
  mysql-fraud-data:
  mysql-audit-data:
  redis-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  prometheus-data:
  grafana-data:
