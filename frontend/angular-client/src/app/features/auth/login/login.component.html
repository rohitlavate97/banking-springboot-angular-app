<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-header">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p class="text-muted">Sign in to your NexaBank account</p>
    </div>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          id="email"
          type="email"
          class="form-control"
          [class.is-invalid]="email.invalid && email.touched"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <span class="form-error" *ngIf="email.invalid && email.touched">
          <span *ngIf="email.errors?.['required']">Email is required.</span>
          <span *ngIf="email.errors?.['email']">Enter a valid email address.</span>
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          [class.is-invalid]="password.invalid && password.touched"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <span class="form-error" *ngIf="password.invalid && password.touched">
          <span *ngIf="password.errors?.['required']">Password is required.</span>
          <span *ngIf="password.errors?.['minlength']">Password must be at least 6 characters.</span>
        </span>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading">
        <span class="spinner spinner-sm" *ngIf="loading"></span>
        <span *ngIf="!loading">Sign in</span>
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="register">Create one</a>
    </p>
  </div>
</div>
