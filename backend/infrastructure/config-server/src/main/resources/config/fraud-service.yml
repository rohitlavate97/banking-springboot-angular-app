spring:
  datasource:
    url: jdbc:mysql://localhost:3312/fraud_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Admin@123
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:29092

fraud:
  large-transaction-threshold: 10000
  rapid-transfer-window-minutes: 5
  rapid-transfer-max-count: 3

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

